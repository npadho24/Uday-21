<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>21 Days Affirmation Tracker</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .day { width: 40px; height: 40px; line-height: 40px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; transition: 0.3s; }
        .day.completed { background: #2ecc71; color: white; border-color: #27ae60; }
        .affirmation-box { margin-top: 30px; padding: 15px; background: #e8f8f5; border-left: 5px solid #2ecc71; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>21-Day Affirmation</h1>
    <div id="affirmation" class="affirmation-box">आज का विचार: "मैं अपनी सफलता के लिए तैयार हूँ।"</div>
    
    <div class="grid" id="trackerGrid">
        </div>
    
    <p style="margin-top: 20px;">अपनी प्रोग्रेस ट्रैक करने के लिए दिन पर टैप करें।</p>
</div>

<script>
    const grid = document.getElementById('trackerGrid');
    const totalDays = 21;

    // Load progress from local storage
    let progress = JSON.parse(localStorage.getItem('aff_progress')) || [];

    for (let i = 1; i <= totalDays; i++) {
        let dayDiv = document.createElement('div');
        dayDiv.innerText = i;
        dayDiv.classList.add('day');
        if (progress.includes(i)) dayDiv.classList.add('completed');

        dayDiv.onclick = function() {
            if (!this.classList.contains('completed')) {
                this.classList.add('completed');
                progress.push(i);
            } else {
                this.classList.remove('completed');
                progress = progress.filter(d => d !== i);
            }
            localStorage.setItem('aff_progress', JSON.stringify(progress));
        };
        grid.appendChild(dayDiv);
    }
</script>

</body>
</html>
