<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>उदय 21</title>
    <style>
        :root { --primary: #1a5f7a; --success: #2ecc71; --missed: #e74c3c; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .app-card { background: white; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; position: relative; }
        .header { background: var(--primary); color: white; padding: 25px; text-align: center; }
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; padding: 20px; }
        .day { padding: 15px 0; border: 2px solid #ddd; border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold; transition: 0.3s; }
        
        /* Status Colors */
        .completed { background: var(--success) !important; color: white; border-color: var(--success); }
        .missed { background: var(--missed) !important; color: white; border-color: var(--missed); }
        
        #certificate { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 10; text-align: center; padding-top: 50px; }
        .cert-box { border: 10px double var(--primary); margin: 20px; padding: 30px; }
        button { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

<div class="app-card">
    <div id="certificate">
        <div class="cert-box">
            <h1>उदय 21</h1>
            <h3>बधाई हो!</h3>
            <p>आपने सफलतापूर्वक 21 दिनों का सफर पूरा किया और अपनी आदतों को नवीनीकृत (Renew) किया।</p>
            <h2 id="userName">विजेता</h2>
            <button onclick="window.print()">Download Certificate</button>
        </div>
    </div>

    <div class="header">
        <h1>उदय 21</h1>
        <p id="statusMsg">आज का दिन चुनें</p>
    </div>

    <div class="grid" id="grid"></div>
    
    <div style="padding: 20px; text-align: center;">
        <p><small>Green = पूरा | Red = मिस हुआ | Gray = आने वाला</small></p>
        <button onclick="resetApp()" style="background: #95a5a6;">Reset Journey</button>
    </div>
</div>

<script>
    const grid = document.getElementById('grid');
    // डेटा स्ट्रक्चर: { day1: 'completed', day2: 'missed' }
    let history = JSON.parse(localStorage.getItem('uday21_data')) || {};

    function render() {
        grid.innerHTML = '';
        let doneCount = 0;

        for (let i = 1; i <= 21; i++) {
            const div = document.createElement('div');
            div.className = 'day';
            div.innerText = i;

            if (history[i] === 'completed') {
                div.classList.add('completed');
                doneCount++;
            } else if (history[i] === 'missed') {
                div.classList.add('missed');
            }

            div.onclick = () => {
                if (!history[i]) history[i] = 'completed';
                else if (history[i] === 'completed') history[i] = 'missed';
                else delete history[i];
                
                localStorage.setItem('uday21_data', JSON.stringify(history));
                render();
            };
            grid.appendChild(div);
        }

        if (doneCount >= 21) {
            document.getElementById('certificate').style.display = 'block';
        }
    }

    function resetApp() {
        if(confirm("क्या आप अपनी प्रोग्रेस डिलीट करना चाहते हैं?")) {
            localStorage.removeItem('uday21_data');
            history = {};
            render();
        }
    }

    render();
</script>
</body>
</html>
