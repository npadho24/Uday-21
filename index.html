<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Uday 21 - Cloud Edition</title>
    <style>
        :root { --primary: #1a5f7a; --success: #2ecc71; --missed: #e74c3c; --locked: #dfe6e9; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 10px; display: flex; justify-content: center; }
        .app-card { background: white; width: 100%; max-width: 450px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); overflow: hidden; display: none; }
        .login-card { background: white; width: 100%; max-width: 400px; padding: 40px; border-radius: 20px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.1); margin-top: 50px; }
        .header { background: var(--primary); color: white; padding: 20px; text-align: center; }
        .task-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 12px; border-radius: 10px; background: #fdfdfd; border: 1px solid #eee; }
        .task-name { font-weight: bold; color: #34495e; font-size: 14px; }
        .check-dot { width: 35px; height: 35px; border-radius: 8px; border: 2px solid #ddd; display: flex; align-items: center; justify-content: center; cursor: pointer; font-weight: bold; }
        .check-dot.active { background: var(--success) !important; color: white; border-color: var(--success); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; padding: 20px; }
        .day-box { height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; background: var(--locked); color: #7f8c8d; font-size: 13px; font-weight: bold; }
        .day-box.completed { background: var(--success) !important; color: white; }
        .day-box.missed { background: var(--missed) !important; color: white; }
        .day-box.today { border: 2px solid var(--primary); color: var(--primary); background: white; }
        .btn-google { background: white; border: 1px solid #ddd; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; display: flex; align-items: center; gap: 10px; margin: auto; }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-card">
        <h1 style="color: var(--primary);">UDAY 21</h1>
        <p>अपनी प्रोग्रेस सेव करने के लिए लॉगिन करें</p>
        <button class="btn-google" onclick="login()">
            <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" width="20"> Google के साथ लॉगिन करें
        </button>
    </div>

    <div id="mainApp" class="app-card">
        <div class="header">
            <h1 style="margin:0">UDAY 21</h1>
            <p>स्वागत है, <span id="userName">User</span></p>
        </div>
        <div style="padding: 15px;">
            <h4 style="color: var(--primary);">आज के कार्य (4 टास्क × 3 बार)</h4>
            <div id="tasksContainer"></div>
        </div>
        <div class="grid" id="calendarGrid"></div>
        <div style="text-align: center; padding: 20px;">
            <button onclick="logout()" style="background:none; border:none; color: #888; text-decoration: underline; cursor:pointer;">Logout</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";

    // 1. अपनी Firebase डिटेल्स यहाँ पेस्ट करें
    const firebaseConfig = {
    apiKey: "AIzaSyD7-zqROc3cP92x-opPrUFVBWexPTcBMxY",
    authDomain: "uday-21-tracker.firebaseapp.com",
    projectId: "uday-21-tracker",
    storageBucket: "uday-21-tracker.firebasestorage.app",
    messagingSenderId: "358897503625",
    appId: "1:358897503625:web:a4363a7e17291115d2e558"
  };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let currentUser = null;
    let udayData = { startDate: new Date().toDateString(), history: {}, todayTasks: { "Affirmation": [], "Visualization": [], "Grateful": [], "Ho'oponopono": [] } };

    // लॉगिन फंक्शन
    window.login = () => signInWithPopup(auth, provider);
    window.logout = () => signOut(auth).then(() => location.reload());

    // यूजर की स्थिति चेक करना
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('loginScreen').style.display = 'none';
            document.getElementById('mainApp').style.display = 'block';
            document.getElementById('userName').innerText = user.displayName.split(' ')[0];
            
            // क्लाउड से डेटा लोड करें
            const docRef = doc(db, "users", user.uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) udayData = docSnap.data();
            render();
        }
    });

    function render() {
        const todayStr = new Date().toDateString();
        const diff = Math.floor((new Date() - new Date(udayData.startDate)) / 86400000) + 1;

        // टास्क रेंडर
        const container = document.getElementById('tasksContainer');
        container.innerHTML = '';
        let totalSelected = 0;
        ["Affirmation", "Visualization", "Grateful", "Ho'oponopono"].forEach(name => {
            const div = document.createElement('div');
            div.className = 'task-group';
            let buttons = '';
            for(let i=1; i<=3; i++) {
                const active = udayData.todayTasks[name]?.includes(i);
                if(active) totalSelected++;
                buttons += `<div class="check-dot ${active ? 'active' : ''}" onclick="window.toggleTask('${name}', ${i})">${i}</div>`;
            }
            div.innerHTML = `<div class="task-name">${name}</div><div style="display:flex;gap:10px">${buttons}</div>`;
            container.appendChild(div);
        });

        // कैलेंडर रेंडर
        const grid = document.getElementById('calendarGrid');
        grid.innerHTML = '';
        for (let i = 1; i <= 21; i++) {
            const box = document.createElement('div');
            box.className = 'day-box';
            box.innerText = i;
            if (udayData.history[i] === 'completed') box.classList.add('completed');
            else if (udayData.history[i] === 'missed') box.classList.add('missed');
            else if (i === diff) {
                box.classList.add('today');
                if (totalSelected >= 12) { box.classList.add('completed'); udayData.history[i] = 'completed'; }
            }
            grid.appendChild(box);
        }
        saveToCloud();
    }

    window.toggleTask = (name, val) => {
        if (!udayData.todayTasks[name]) udayData.todayTasks[name] = [];
        let list = udayData.todayTasks[name];
        udayData.todayTasks[name] = list.includes(val) ? list.filter(v => v !== val) : [...list, val];
        render();
    };

    async function saveToCloud() {
        if (currentUser) await setDoc(doc(db, "users", currentUser.uid), udayData);
    }
</script>
</body>
</html>
